services:
  # -----------------------------
  # LLM SERVER (Ollama)
  # -----------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: >
      bash -c "
      ollama serve & sleep 10 &&
      ollama pull llama3.1 &&
      ollama pull qwen2.5:7b &&
      ollama pull qwen2.5-coder:14b &&
      wait
      "

  # -----------------------------
  # ORCHESTRATOR (AI BRAIN)
  # -----------------------------
  orchestrator:
    build: ./orchestrator
    container_name: ai-orchestrator
    depends_on:
      - ollama
      - redis
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
    volumes:
      - ./orchestrator:/app
    working_dir: /app
    restart: unless-stopped
    gpus: all


  # -----------------------------
  # REDIS (STATE / MEMORY)
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    gpus: all


  # # -----------------------------
  # # QDRANT (VECTOR MEMORY)
  # # -----------------------------
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: ai-qdrant
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   restart: unless-stopped
  #   gpus: all


volumes:
  ollama_data:
  qdrant_data:
